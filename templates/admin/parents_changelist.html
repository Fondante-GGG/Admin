{% extends "admin/change_list.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'crm_dashboard/students.css' %}">
{% endblock %}

{% block content %}
<div class="crm-dashboard">
  <h1>Родители</h1>

  <div class="crm-toolbar">
    <button type="button" onclick="document.getElementById('parent-create-modal').classList.remove('is-hidden')" class="crm-btn crm-btn--primary">+ Создать родителя</button>
  </div>

  {{ block.super }}
</div>

<!-- Модальное окно создания родителя -->
<div id="parent-create-modal" class="crm-drawer is-hidden" style="z-index:9999;">
  <div class="crm-drawer__backdrop" onclick="document.getElementById('parent-create-modal').classList.add('is-hidden')"></div>
  <div class="crm-drawer__panel" style="max-width:520px; padding:28px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="font-size:20px; font-weight:800; margin:0;">Новый родитель</h2>
      <button type="button" onclick="document.getElementById('parent-create-modal').classList.add('is-hidden')" style="background:none; border:none; font-size:22px; cursor:pointer;">&times;</button>
    </div>
    <form method="post" action="{% url 'crm_admin:parent_quick_create' %}">
      {% csrf_token %}
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <label style="display:flex; flex-direction:column; gap:6px; font-size:13px; color:#374151;">Имя*
          <input type="text" name="first_name" required style="padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:14px;">
        </label>
        <label style="display:flex; flex-direction:column; gap:6px; font-size:13px; color:#374151;">Фамилия*
          <input type="text" name="last_name" required style="padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:14px;">
        </label>
        <label style="display:flex; flex-direction:column; gap:6px; font-size:13px; color:#374151;">Телефон
          <input type="text" name="phone_number" style="padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:14px;">
        </label>
        <label style="display:flex; flex-direction:column; gap:6px; font-size:13px; color:#374151;">Пароль
          <input type="text" name="password" placeholder="Оставьте пустым — сгенерируется" style="padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:14px;">
        </label>
      </div>
      <label style="display:flex; flex-direction:column; gap:6px; font-size:13px; color:#374151; margin-top:14px;">Студенты *
        <input type="text" id="parent-student-filter" placeholder="Поиск по имени..." style="padding:8px 12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:14px; margin-bottom:6px;">
        <select name="students" id="parent-students-select" multiple required style="padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:14px; min-height:120px;">
          {% for s in students_for_parent %}
          <option value="{{ s.pk }}">{{ s.user.get_full_name|default:s.user.username }}{% if s.middle_name %} {{ s.middle_name }}{% endif %}</option>
          {% empty %}
          <option value="" disabled>Нет студентов в этой организации</option>
          {% endfor %}
        </select>
        <span style="font-size:11px; color:#9ca3af;">Удерживайте Ctrl (Cmd на Mac) для выбора нескольких</span>
        {% if not students_for_parent %}
        <span style="font-size:12px; color:#dc2626;">Сначала создайте студента в разделе «Студенты» для текущей организации.</span>
        {% endif %}
      </label>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px;">
        <button type="button" onclick="document.getElementById('parent-create-modal').classList.add('is-hidden')" class="crm-btn crm-btn--outline">Отмена</button>
        <button type="submit" class="crm-btn crm-btn--primary" {% if not students_for_parent %}disabled{% endif %}>Сохранить</button>
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  const filter = document.getElementById('parent-student-filter');
  const select = document.getElementById('parent-students-select');
  if (!filter || !select) return;
  const allOptions = Array.from(select.options)
    .filter(function (o) { return o.value; })
    .map(function (o) { return { value: o.value, text: o.text }; });

  function renderOptions(q) {
    const query = (q || '').trim().toLowerCase();
    select.innerHTML = '';
    const matched = allOptions.filter(function (o) {
      return !query || o.text.toLowerCase().includes(query);
    });
    if (!matched.length) {
      const empty = document.createElement('option');
      empty.disabled = true;
      empty.textContent = allOptions.length ? 'Ничего не найдено' : 'Нет студентов в этой организации';
      select.appendChild(empty);
      return;
    }
    matched.forEach(function (o) {
      const opt = document.createElement('option');
      opt.value = o.value;
      opt.textContent = o.text;
      select.appendChild(opt);
    });
  }

  filter.addEventListener('input', function () {
    renderOptions(this.value);
  });
})();
</script>
{% endblock %}
