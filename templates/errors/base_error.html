<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ошибка{% endblock %} — CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f6fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .error-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
    }
    .error-code {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 22px;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
    }
    .btn-outline {
      background: #fff;
      color: #374151;
      border: 1.5px solid #e5e7eb;
    }
    .btn-outline:hover { border-color: #667eea; color: #667eea; }

    /* Цвета по коду */
    .theme-404 .error-code { color: #667eea; }
    .theme-403 .error-code { color: #ef4444; }
    .theme-500 .error-code { color: #f59e0b; }
    .theme-401 .error-code { color: #10b981; }
  </style>
</head>
<body class="{% block theme_class %}theme-404{% endblock %}">
  <div class="error-card">
    <div class="error-code">{% block code %}404{% endblock %}</div>
    <h1 class="error-title">{% block heading %}Страница не найдена{% endblock %}</h1>
    <p class="error-desc">{% block message %}Запрашиваемая страница не существует или была удалена.{% endblock %}</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">На главную</a>
      <a href="javascript:history.back()" class="btn btn-outline">Назад</a>
    </div>
  </div>
</body>
</html>
